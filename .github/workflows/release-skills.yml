name: Release Skills Bundle

# Publishes the skills/ tree as a signed OTA bundle to the fixed prerelease
# `skills-channel`, independently of app binary releases. Assets are immutable
# (unique per run id, never clobbered); the app discovers the newest bundle by
# listing the release assets and picking the highest revision. The prerelease
# + latest=false flags keep GitHub's "latest" (and therefore the Tauri
# updater's latest.json endpoint) pointed at app releases.

on:
  push:
    branches: [main]
    paths: ["skills/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-skills
  cancel-in-progress: false

jobs:
  publish:
    name: Package and publish skills bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Install frontend dependencies (tauri CLI for signing)
        run: pnpm install --frozen-lockfile

      - name: Verify skills
        run: make skills-verify

      - name: Package bundle
        run: make skills-package REVISION=${{ github.run_id }}

      - name: Sign bundle and metadata
        run: |
          set -euo pipefail
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not configured; refusing to publish unsigned skills bundle."
            exit 1
          fi
          for file in dist-skills/*.zip dist-skills/*.json; do
            pnpm tauri signer sign "$file"
            test -s "$file.sig"
          done
          ls -la dist-skills/

      - name: Ensure skills-channel release exists
        run: |
          set -euo pipefail
          if ! gh release view skills-channel >/dev/null 2>&1; then
            gh release create skills-channel \
              --prerelease --latest=false \
              --title "Skills bundle channel" \
              --notes "Rolling channel for Maru OTA skill bundles. Assets are immutable and consumed by the app; do not edit or delete."
          fi

      - name: Upload immutable assets
        run: |
          set -euo pipefail
          # No --clobber: assets are immutable. Run ids are unique, so a name
          # collision means something is wrong and the upload should fail.
          gh release upload skills-channel dist-skills/*
